<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Juegos | Misiones Educativas</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --azul-oscuro: #001a33;
            --azul-profundo: #000d1a;
            --naranja: #f39200;
            --naranja-hover: #d68100;
            --blanco: #ffffff;
            --bg-degradado: radial-gradient(circle at center, #002d56 0%, #000d1a 100%);
            --bg-tarjeta: rgba(255, 255, 255, 0.05);
            --borde-tarjeta: rgba(243, 146, 0, 0.15);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-degradado); 
            background-attachment: fixed;
            color: var(--blanco);
            margin: 0; 
            padding: 10px 20px; 
            min-height: 100vh;
        }

        /* Cabecera y Glow del Logo */
        .header-container {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 30px 2%;
            max-width: 1600px;
            margin: 0 auto;
            gap: 40px;
        }

        .logo-principal {
            max-width: 280px;
            height: auto;
            /* GLOW NARANJA INTENSO SOLICITADO */
            filter: drop-shadow(0 0 20px rgba(243, 146, 0, 0.6));
        }

        .buscador-wrapper {
            flex-grow: 1;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .buscador-container {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .buscador-container select {
            background: var(--azul-oscuro);
            color: white;
            border: 1px solid var(--naranja);
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 0.85em;
            width: 100%;
        }

        .contador-juegos {
            font-size: 0.8em;
            color: var(--naranja);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Galería */
        #galeria { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 360px)); 
            gap: 35px; 
            max-width: 1300px; 
            margin: 40px auto; 
            justify-content: center;
        }

        .tarjeta { 
            background: var(--bg-tarjeta); 
            border: 1px solid var(--borde-tarjeta);
            border-radius: 24px; 
            padding: 18px; 
            backdrop-filter: blur(15px);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            height: 520px; /* Ajustada para la nueva descripción */
        }

        .tarjeta:hover { 
            transform: translateY(-12px);
            border-color: var(--naranja);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .tarjeta img { 
            width: 100%; 
            height: 190px; 
            border-radius: 16px; 
            object-fit: cover;
            margin-bottom: 18px;
        }
        
        .tarjeta h3 { 
            color: var(--naranja); 
            margin: 0 0 10px; 
            font-size: 1.3em; 
            font-family: 'Orbitron', sans-serif;
        }

        .desc-breve {
            font-style: italic;
            color: #94a3b8;
            font-size: 0.85em;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .datos-tecnicos { 
            color: #cbd5e1; 
            font-size: 0.85em; 
            flex-grow: 1; 
            line-height: 1.6;
        }

        .datos-tecnicos strong { color: var(--blanco); font-size: 0.8em; }

        .boton { 
            background: var(--naranja); 
            color: var(--azul-oscuro); 
            text-decoration: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 800; 
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        .boton:hover { background: white; }

        @media (max-width: 950px) {
            .header-container { flex-direction: column; text-align: center; }
            .buscador-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="auladejuegoslogo.png" alt="Aula de Juegos Logo" class="logo-principal">
        <div class="buscador-wrapper">
            <div id="contador" class="contador-juegos">Cargando misiones...</div>
            <div class="buscador-container">
                <select id="filtroAsignatura">
                    <option value="">Todas las Asignaturas</option>
                </select>
                <select id="filtroNivel">
                    <option value="">Todos los Niveles</option>
                </select>
                <select id="filtroAutor">
                    <option value="">Todos los Autores</option>
                </select>
            </div>
        </div>
    </div>

    <div id="galeria">Preparando misiones...</div>

    <script>
        // URL de tu publicación CSV de Google Sheets
        const public_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUMXESTy3X_mpYu46HYSRiFgGj2WT0Cc4beQDz7PB2AS3JvnrKUXN4oEYq2oNKcd89B31hruGPyj5u/pub?output=csv';
        let datosJuegos = [];

        Papa.parse(public_url, {
            download: true,
            header: true,
            complete: function(results) {
                // Filtramos por el nuevo campo "Título"
                datosJuegos = results.data.filter(j => j["Título"] && j["Título"].trim() !== "");
                actualizarContador(datosJuegos.length);
                poblarFiltros(datosJuegos);
                mostrarJuegos(datosJuegos);
            }
        });

        function actualizarContador(num) {
            document.getElementById('contador').innerText = `${num} misiones disponibles`;
        }

        function poblarFiltros(juegos) {
            // Usamos los nombres exactos del formulario para los filtros
            const asignaturas = [...new Set(juegos.map(j => j["Asignatura"]))].filter(Boolean).sort();
            const niveles = [...new Set(juegos.map(j => j["Nivel"]))].filter(Boolean).sort();
            const autores = [...new Set(juegos.map(j => j["Autor"]))].filter(Boolean).sort();

            const selectAsig = document.getElementById('filtroAsignatura');
            const selectNivel = document.getElementById('filtroNivel');
            const selectAuto = document.getElementById('filtroAutor');

            asignaturas.forEach(a => selectAsig.innerHTML += `<option value="${a}">${a}</option>`);
            niveles.forEach(n => selectNivel.innerHTML += `<option value="${n}">${n}</option>`);
            autores.forEach(a => selectAuto.innerHTML += `<option value="${a}">${a}</option>`);
        }

        function mostrarJuegos(juegos) {
            const galeria = document.getElementById('galeria');
            galeria.innerHTML = '';
            
            juegos.forEach((juego, index) => {
                // Mapeo de campos exactos del formulario
                const titulo = juego["Título"];
                const desc = juego["Descripción breve"] || "Explora esta nueva misión educativa.";
                const autor = juego["Autor"];
                const asignatura = juego["Asignatura"];
                const nivel = juego["Nivel"] || "General";
                const urlJuego = juego["url del juego"];
                const urlMiniatura = juego["url de miniatura"] || "https://placehold.co/400x250/002d56/f39200?text=AULA+DE+JUEGOS";
                
                const card = document.createElement('div');
                card.className = 'tarjeta';
                card.innerHTML = `
                    <img src="${urlMiniatura}" alt="${titulo}">
                    <h3>${titulo}</h3>
                    <p class="desc-breve">${desc}</p>
                    <p class="datos-tecnicos">
                        <strong>📚 ASIGNATURA:</strong> ${asignatura}<br>
                        <strong>🎮 NIVEL:</strong> ${nivel}<br>
                        <strong>✏️ AUTOR:</strong> ${autor}
                    </p>
                    <a href="${urlJuego}" class="boton" target="_blank">¡JUGAR AHORA!</a>
                `;
                galeria.appendChild(card);
            });
        }

        // Lógica de filtrado
        document.querySelectorAll('select').forEach(select => {
            select.addEventListener('change', () => {
                const asigVal = document.getElementById('filtroAsignatura').value;
                const nivelVal = document.getElementById('filtroNivel').value;
                const autoVal = document.getElementById('filtroAutor').value;

                const filtrados = datosJuegos.filter(j => {
                    return (asigVal === "" || j["Asignatura"] === asigVal) &&
                           (nivelVal === "" || j["Nivel"] === nivelVal) &&
                           (autoVal === "" || j["Autor"] === autoVal);
                });
                mostrarJuegos(filtrados);
                actualizarContador(filtrados.length);
            });
        });
    </script>
</body>
</html>

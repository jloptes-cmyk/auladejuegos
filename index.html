<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Juegos | Misiones Educativas</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --azul-oscuro: #001a33;
            --azul-profundo: #000d1a;
            --naranja: #f39200;
            --naranja-hover: #d68100;
            --blanco: #ffffff;
           --bg-degradado: #ffffff; /* Esto lo hace blanco puro */
            --bg-tarjeta: rgba(255, 255, 255, 0.05);
            --borde-tarjeta: rgba(243, 146, 0, 0.15);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-degradado); 
            background-attachment: fixed;
            color: var(--blanco);
            margin: 0; 
            padding: 10px 20px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Cabecera */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 2%;
            max-width: 1600px;
            margin: 0 auto;
            gap: 20px;
        }

        .logo-principal {
            max-width: 280px;
            height: auto;
            filter: drop-shadow(0 0 12px rgba(243, 146, 0, 0.3));
            transition: transform 0.3s ease;
        }

        .logo-principal:hover {
            transform: scale(1.02);
        }

        /* Buscador */
        .buscador-wrapper {
            flex-grow: 1;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .buscador-container {
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .buscador-container select {
            background: var(--azul-oscuro);
            color: white;
            border: 1px solid var(--naranja);
            padding: 10px 15px;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            font-size: 0.9em;
            width: 100%;
        }

        .contador-juegos {
            font-size: 0.85em;
            color: var(--naranja);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Botón Proponer Juego */
        .btn-enviar {
            white-space: nowrap;
            border: 2px solid var(--naranja);
            color: var(--naranja);
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9em;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-enviar:hover {
            background: var(--naranja);
            color: var(--azul-oscuro);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(243, 146, 0, 0.4);
        }
        
        /* Galería y Tarjetas */
        #galeria { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 360px)); 
            gap: 35px; 
            max-width: 1300px; 
            margin: 50px auto; 
            justify-content: center;
        }

        .tarjeta { 
            background: var(--bg-tarjeta); 
            border: 1px solid var(--borde-tarjeta);
            border-radius: 24px; 
            padding: 18px; 
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            height: 460px; /* Aumentado ligeramente para el nuevo campo */
        }

        .tarjeta:hover { 
            transform: translateY(-12px);
            border-color: var(--naranja);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(243, 146, 0, 0.15);
        }

        .tarjeta img { 
            width: 100%; 
            height: 190px; 
            border-radius: 16px; 
            object-fit: cover;
            margin-bottom: 18px;
        }
        
        .tarjeta h3 { 
            color: var(--naranja); 
            margin: 0 0 12px; 
            font-size: 1.5em; 
            font-family: 'Orbitron', sans-serif;
        }

        .tarjeta p { 
            color: #cbd5e1; 
            font-size: 0.9em; 
            flex-grow: 1; 
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .tarjeta p strong {
            color: var(--blanco);
        }

        .boton { 
            background: var(--naranja); 
            color: var(--azul-oscuro); 
            text-decoration: none; 
            padding: 15px; 
            border-radius: 14px; 
            font-weight: 800; 
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tarjeta-animada {
            animation: fadeInUp 0.6s ease forwards;
        }

        @media (max-width: 900px) {
            .header-container { flex-direction: column; }
            .logo-principal { max-width: 220px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="auladejuegoslogo.png" alt="Aula de Juegos Logo" class="logo-principal">
        <div class="buscador-wrapper">
            <div id="contador" class="contador-juegos">Cargando arsenal...</div>
            <div class="buscador-container">
                <select id="filtroAsignatura">
                    <option value="">Todas las Asignaturas</option>
                </select>
                <select id="filtroAutor">
                    <option value="">Todos los Autores</option>
                </select>
            </div>
        </div>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdKjYpJG7aqgwj9SMhc9wKuxuaieokz27u_r1nzcjXfVqeowA/viewform?usp=sharing&ouid=105781798792806392011" target="_blank" class="btn-enviar">+ PROPONER UN JUEGO</a>
    </div>

    <div id="galeria">Preparando misiones...</div>

    <script>
        const public_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUMXESTy3X_mpYu46HYSRiFgGj2WT0Cc4beQDz7PB2AS3JvnrKUXN4oEYq2oNKcd89B31hruGPyj5u/pub?output=csv';
        let datosJuegos = [];

        Papa.parse(public_url, {
            download: true,
            header: true,
            complete: function(results) {
                datosJuegos = results.data.filter(j => j.titulo && j.titulo.trim() !== "");
                actualizarContador(datosJuegos.length);
                poblarFiltros(datosJuegos);
                mostrarJuegos(datosJuegos);
            }
        });

        function actualizarContador(num) {
            document.getElementById('contador').innerText = `Explorando ${num} misiones disponibles`;
        }

        function poblarFiltros(juegos) {
            const asignaturas = [...new Set(juegos.map(j => j.asignatura))].sort();
            const autores = [...new Set(juegos.map(j => j.autor))].sort();
            const selectAsig = document.getElementById('filtroAsignatura');
            const selectAuto = document.getElementById('filtroAutor');
            asignaturas.forEach(a => { if(a) selectAsig.innerHTML += `<option value="${a}">${a}</option>`; });
            autores.forEach(a => { if(a) selectAuto.innerHTML += `<option value="${a}">${a}</option>`; });
        }

        function mostrarJuegos(juegos) {
            const galeria = document.getElementById('galeria');
            galeria.innerHTML = '';
            
            juegos.forEach((juego, index) => {
                const m = juego.miniatura || "https://placehold.co/400x250/002d56/f39200?text=JUEGO";
                // IMPORTANTE: Asegúrate de que en tu Excel la columna se llame exactamente "nivel"
                const n = juego.nivel || "No especificado"; 
                
                const card = document.createElement('div');
                card.className = 'tarjeta tarjeta-animada';
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <img src="${m}" alt="${juego.titulo}">
                    <h3>${juego.titulo}</h3>
                    <p>
                        <strong>📚 ASIGNATURA:</strong> ${juego.asignatura}<br>
                        <strong>🎮 NIVEL:</strong> ${n}<br>
                        <strong>✏️ AUTOR:</strong> ${juego.autor}
                    </p>
                    <a href="${juego.url}" class="boton" target="_blank">¡JUGAR AHORA!</a>
                `;
                galeria.appendChild(card);
            });
        }

        document.querySelectorAll('select').forEach(select => {
            select.addEventListener('change', () => {
                const asigVal = document.getElementById('filtroAsignatura').value;
                const autoVal = document.getElementById('filtroAutor').value;
                const filtrados = datosJuegos.filter(j => {
                    return (asigVal === "" || j.asignatura === asigVal) &&
                           (autoVal === "" || j.autor === autoVal);
                });
                mostrarJuegos(filtrados);
                actualizarContador(filtrados.length);
            });
        });
    </script>
</body>
</html>

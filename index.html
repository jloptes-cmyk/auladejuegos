<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Juegos | Misiones Educativas</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --naranja: #f39200;
            --naranja-hover: #d68100;
            --blanco: #ffffff;
            --gris-claro: #f8f9fa;
            --texto-oscuro: #1a1a1a;
            --texto-secundario: #4a5568;
            --bg-tarjeta: #ffffff;
            --borde-tarjeta: rgba(243, 146, 0, 0.2);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--blanco); /* Fondo cambiado a blanco */
            color: var(--texto-oscuro);
            margin: 0; 
            padding: 10px 20px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Cabecera ajustada sin el botón */
        .header-container {
            display: flex;
            justify-content: flex-start; /* Alinea todo a la izquierda */
            align-items: center;
            padding: 30px 2%;
            max-width: 1600px;
            margin: 0 auto;
            gap: 40px;
        }

        .logo-principal {
            max-width: 280px;
            height: auto;
            transition: transform 0.3s ease;
        }

        .buscador-wrapper {
            flex-grow: 1;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .buscador-container {
            display: flex;
            gap: 12px;
            background: var(--gris-claro);
            padding: 10px 15px;
            border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.1);
            width: 100%;
        }

        .buscador-container select {
            background: white;
            color: var(--texto-oscuro);
            border: 1px solid var(--naranja);
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 0.9em;
            width: 100%;
        }

        .contador-juegos {
            font-size: 0.8em;
            color: var(--naranja);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Tarjetas adaptadas al fondo blanco */
        #galeria { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 360px)); 
            gap: 35px; 
            max-width: 1300px; 
            margin: 40px auto; 
            justify-content: center;
        }

        .tarjeta { 
            background: var(--bg-tarjeta); 
            border: 1px solid var(--borde-tarjeta);
            border-radius: 24px; 
            padding: 18px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            height: 460px;
        }

        .tarjeta:hover { 
            transform: translateY(-10px);
            border-color: var(--naranja);
            box-shadow: 0 12px 30px rgba(243, 146, 0, 0.15);
        }

        .tarjeta img { 
            width: 100%; 
            height: 190px; 
            border-radius: 16px; 
            object-fit: cover;
            margin-bottom: 18px;
        }
        
        .tarjeta h3 { 
            color: var(--naranja); 
            margin: 0 0 10px; 
            font-size: 1.4em; 
            font-family: 'Orbitron', sans-serif;
        }

        .tarjeta p { 
            color: var(--texto-secundario); 
            font-size: 0.9em; 
            flex-grow: 1; 
            line-height: 1.5;
        }

        .tarjeta p strong { color: var(--texto-oscuro); }

        .boton { 
            background: var(--naranja); 
            color: white; 
            text-decoration: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 800; 
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .boton:hover { background: var(--naranja-hover); box-shadow: 0 4px 12px rgba(243, 146, 0, 0.3); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tarjeta-animada { animation: fadeInUp 0.5s ease forwards; }

        @media (max-width: 800px) {
            .header-container { flex-direction: column; gap: 20px; }
            .buscador-wrapper { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="auladejuegoslogo.png" alt="Aula de Juegos Logo" class="logo-principal">
        
        <div class="buscador-wrapper">
            <div id="contador" class="contador-juegos">Cargando misiones...</div>
            <div class="buscador-container">
                <select id="filtroAsignatura">
                    <option value="">Todas las Asignaturas</option>
                </select>
                <select id="filtroAutor">
                    <option value="">Todos los Autores</option>
                </select>
            </div>
        </div>
    </div>

    <div id="galeria">Preparando misiones...</div>

    <script>
        const public_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUMXESTy3X_mpYu46HYSRiFgGj2WT0Cc4beQDz7PB2AS3JvnrKUXN4oEYq2oNKcd89B31hruGPyj5u/pub?output=csv';
        let datosJuegos = [];

        Papa.parse(public_url, {
            download: true,
            header: true,
            complete: function(results) {
                datosJuegos = results.data.filter(j => j.titulo && j.titulo.trim() !== "");
                actualizarContador(datosJuegos.length);
                poblarFiltros(datosJuegos);
                mostrarJuegos(datosJuegos);
            }
        });

        function actualizarContador(num) {
            document.getElementById('contador').innerText = `${num} misiones disponibles`;
        }

        function poblarFiltros(juegos) {
            const asignaturas = [...new Set(juegos.map(j => j.asignatura))].sort();
            const autores = [...new Set(juegos.map(j => j.autor))].sort();
            const selectAsig = document.getElementById('filtroAsignatura');
            const selectAuto = document.getElementById('filtroAutor');
            asignaturas.forEach(a => { if(a) selectAsig.innerHTML += `<option value="${a}">${a}</option>`; });
            autores.forEach(a => { if(a) selectAuto.innerHTML += `<option value="${a}">${a}</option>`; });
        }

        function mostrarJuegos(juegos) {
            const galeria = document.getElementById('galeria');
            galeria.innerHTML = '';
            
            juegos.forEach((juego, index) => {
                const m = juego.miniatura || "https://placehold.co/400x250/f8f9fa/f39200?text=JUEGO";
                const n = juego.nivel || "No especificado"; 
                
                const card = document.createElement('div');
                card.className = 'tarjeta tarjeta-animada';
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <img src="${m}" alt="${juego.titulo}">
                    <h3>${juego.titulo}</h3>
                    <p>
                        <strong>📚 ASIGNATURA:</strong> ${juego.asignatura}<br>
                        <strong>🎮 NIVEL:</strong> ${n}<br>
                        <strong>✏️ AUTOR:</strong> ${juego.autor}
                    </p>
                    <a href="${juego.url}" class="boton" target="_blank">¡JUGAR!</a>
                `;
                galeria.appendChild(card);
            });
        }

        document.querySelectorAll('select').forEach(select => {
            select.addEventListener('change', () => {
                const asigVal = document.getElementById('filtroAsignatura').value;
                const autoVal = document.getElementById('filtroAutor').value;
                const filtrados = datosJuegos.filter(j => {
                    return (asigVal === "" || j.asignatura === asigVal) &&
                           (autoVal === "" || j.autor === autoVal);
                });
                mostrarJuegos(filtrados);
                actualizarContador(filtrados.length);
            });
        });
    </script>
</body>
</html>
